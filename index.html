<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#16a34a">
    <meta name="description" content="ResolveAi - Encontre profissionais de confiança perto de você">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ResolveAi">
    <link rel="manifest" href="/manifest.json">
    <meta property="og:title" content="ResolveAi - Marketplace de Serviços">
    <meta property="og:description" content="Encontre profissionais de confiança perto de você">
    <meta property="og:type" content="website">
    <title>ResolveAi - Problemas resolvidos. Rápido.</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/service-worker.js', {
            scope: '/'
          })
            .then((registration) => {
              console.log('✅ Service Worker registrado:', registration)
            })
            .catch((error) => {
              console.error('❌ Erro ao registrar Service Worker:', error)
            })
        })
      }
    </script>
  </body>
</html>
