<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Meta Tags SEO -->
    <meta name="description" content="Encontre profissionais em Castro PR com rapidez e segurança. Solicite serviços no Chama9." />
    <meta name="keywords" content="serviços em Castro PR, eletricista Castro, encanador Castro, pintor Castro, profissionais locais, contratar serviços, Chama9" />
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#22c55e" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Chama9" />
    <meta name="application-name" content="Chama9" />
    <meta name="msapplication-TileColor" content="#22c55e" />
    <meta name="msapplication-TileImage" content="/icons/icon-192.png" />
    <meta name="msapplication-config" content="/browserconfig.xml" />
    
    <!-- OG Tags -->
    <meta property="og:title" content="Chama9 – Serviços locais em Castro PR" />
    <meta property="og:description" content="Encontre profissionais verificados perto de você em Castro - PR" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/logo.png" />
    
    <title>Chama9 – Serviços locais em Castro PR | Encontre profissionais rápido</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    
    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => {
              console.log('✅ Service Worker registrado:', reg)
            })
            .catch(err => {
              console.log('❌ Service Worker erro:', err)
            })
        })
      } else {
        console.log('❌ Service Worker não suportado')
      }

      // Log PWA capability
      console.log('🔍 PWA Capability Check:')
      console.log('- standalone:', window.navigator.standalone)
      console.log('- display-mode:', window.matchMedia('(display-mode: standalone)').matches)
      console.log('- manifest:', document.querySelector('link[rel="manifest"]') ? 'Present' : 'Missing')
    </script>
  </body>
</html>
